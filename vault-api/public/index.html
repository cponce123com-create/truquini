<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bóveda de Credenciales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232738;
      --border: #2e3348;
      --text: #e1e4ed;
      --text2: #8b90a5;
      --accent: #6c63ff;
      --accent-hover: #7f78ff;
      --danger: #ff4d6a;
      --success: #2dd4a0;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hidden { display: none !important; }

    /* Cards / Containers */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .card-wide {
      max-width: 720px;
      width: 95vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p.sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }

    /* Forms */
    label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 0.4rem; margin-top: 1rem; }
    label:first-child { margin-top: 0; }
    input[type="text"],
    input[type="password"],
    input[type="url"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border 0.15s;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--text2); }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    .btn-full { width: 100%; margin-top: 1.2rem; }

    .error-msg {
      background: rgba(255, 77, 106, 0.12);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.6rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-top: 0.8rem;
    }
    .success-msg {
      background: rgba(45, 212, 160, 0.12);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 0.6rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-top: 0.8rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
      align-items: center;
    }
    .toolbar .spacer { flex: 1; }
    .user-badge { color: var(--text2); font-size: 0.85rem; }

    /* Credential list */
    .cred-list { flex: 1; overflow-y: auto; min-height: 0; }
    .cred-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius);
      background: var(--surface2);
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .cred-item:hover { background: #2a2f45; }
    .cred-item .info { flex: 1; min-width: 0; }
    .cred-item .name { font-weight: 600; font-size: 0.9rem; }
    .cred-item .detail { font-size: 0.8rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cred-item .actions { display: flex; gap: 0.3rem; }
    .empty-state { text-align: center; padding: 2rem 0; color: var(--text2); font-size: 0.9rem; }

    /* Modal / overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.8rem;
      width: 90vw;
      max-width: 440px;
    }
    .modal h2 { font-size: 1.2rem; margin-bottom: 0.2rem; }
    .modal p.sub { margin-bottom: 1.2rem; }

    /* Scrollbar */
    .cred-list::-webkit-scrollbar { width: 6px; }
    .cred-list::-webkit-scrollbar-track { background: transparent; }
    .cred-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="screen-login" class="card">
  <h1>🔐 Bóveda de Credenciales</h1>
  <p class="sub">Inicia sesión para acceder a tu bóveda</p>
  <form id="form-login" autocomplete="on">
    <label for="login-username">Usuario</label>
    <input type="text" id="login-username" autocomplete="username" required />
    <label for="login-password">Contraseña</label>
    <input type="password" id="login-password" autocomplete="current-password" required />
    <div id="login-error" class="error-msg hidden"></div>
    <button type="submit" class="btn btn-primary btn-full" id="btn-login">Iniciar sesión</button>
  </form>
</div>

<!-- ==================== MASTER PASSWORD ==================== -->
<div id="screen-master" class="card hidden">
  <h1 id="master-title">🔑 Desbloquear bóveda</h1>
  <p class="sub" id="master-sub">Ingresa tu contraseña maestra para descifrar tus credenciales</p>
  <form id="form-master" autocomplete="off">
    <label for="master-password">Contraseña maestra</label>
    <input type="password" id="master-password" autocomplete="off" required />
    <label for="master-confirm" id="master-confirm-label" class="hidden">Confirmar contraseña maestra</label>
    <input type="password" id="master-confirm" class="hidden" autocomplete="off" />
    <div id="master-error" class="error-msg hidden"></div>
    <button type="submit" class="btn btn-primary btn-full" id="btn-master">Desbloquear</button>
  </form>
</div>

<!-- ==================== VAULT ==================== -->
<div id="screen-vault" class="card card-wide hidden">
  <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.25rem;">
    <span style="font-size:1.4rem;">🔐</span>
    <h1 style="margin-bottom:0;">Bóveda</h1>
  </div>
  <p class="sub" id="vault-status">Cargando...</p>

  <div class="toolbar">
    <button class="btn btn-primary btn-sm" id="btn-add">+ Agregar</button>
    <button class="btn btn-outline btn-sm" id="btn-import">📥 Importar</button>
    <button class="btn btn-outline btn-sm" id="btn-export">📤 Exportar</button>
    <input type="file" id="file-input" accept=".vault,.json" class="hidden" />
    <span class="spacer"></span>
    <span class="user-badge" id="vault-username"></span>
    <button class="btn btn-outline btn-sm" id="btn-logout">Cerrar sesión</button>
  </div>

  <div class="cred-list" id="cred-list">
    <div class="empty-state">No hay credenciales guardadas. Haz clic en "Agregar" para empezar.</div>
  </div>
</div>

<!-- ==================== MODAL CREDENTIAL ==================== -->
<div id="modal-cred" class="overlay hidden">
  <div class="modal">
    <h2 id="modal-cred-title">Nueva credencial</h2>
    <p class="sub">Completa los campos</p>
    <form id="form-cred" autocomplete="off">
      <label for="cred-name">Nombre / Servicio</label>
      <input type="text" id="cred-name" required />
      <label for="cred-username">Usuario</label>
      <input type="text" id="cred-username" />
      <label for="cred-password">Contraseña</label>
      <input type="text" id="cred-password" />
      <label for="cred-url">URL</label>
      <input type="url" id="cred-url" />
      <div id="cred-error" class="error-msg hidden"></div>
      <div style="display:flex;gap:0.5rem;margin-top:1.2rem;">
        <button type="button" class="btn btn-outline" style="flex:1;" id="btn-cred-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" style="flex:1;" id="btn-cred-save">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const API = window.location.origin;
const PBKDF2_ITERATIONS = 600000;
const VAULT_FILE_EXT = '.vault';

// ==================== STATE ====================
let state = {
  username: null,
  masterPassword: null,
  salt: null,      // base64
  iv: null,        // base64
  data: null,      // base64 ciphertext
  version: null,
  credentials: [], // descifrados
  editingIndex: -1,
};

// ==================== DOM REFS ====================
const $ = (id) => document.getElementById(id);

// Screens
const scrLogin  = $('screen-login');
const scrMaster = $('screen-master');
const scrVault  = $('screen-vault');

// Login
const formLogin      = $('form-login');
const inpLoginUser   = $('login-username');
const inpLoginPass   = $('login-password');
const loginError     = $('login-error');
const btnLogin       = $('btn-login');

// Master
const formMaster     = $('form-master');
const inpMasterPass  = $('master-password');
const inpMasterConf  = $('master-confirm');
const masterTitle    = $('master-title');
const masterSub      = $('master-sub');
const masterError    = $('master-error');
const masterConfLabel = $('master-confirm-label');
const btnMaster      = $('btn-master');

// Vault
const vaultStatus    = $('vault-status');
const credList       = $('cred-list');
const vaultUsername  = $('vault-username');
const btnAdd         = $('btn-add');
const btnImport      = $('btn-import');
const btnExport      = $('btn-export');
const btnLogout      = $('btn-logout');
const fileInput      = $('file-input');

// Modal
const modalCred      = $('modal-cred');
const formCred       = $('form-cred');
const credName       = $('cred-name');
const credUsername   = $('cred-username');
const credPassword   = $('cred-password');
const credUrl        = $('cred-url');
const credError      = $('cred-error');
const btnCredCancel  = $('btn-cred-cancel');
const btnCredSave    = $('btn-cred-save');
const modalCredTitle = $('modal-cred-title');

// ==================== API HELPERS ====================
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

// ==================== CRYPTO ====================
async function deriveKey(password, saltB64) {
  const salt = U8.fromB64(saltB64);
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(plaintext, password) {
  const salt = crypto.getRandomValues(new Uint8Array(32));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, U8.toB64(salt));
  const encoded = new TextEncoder().encode(plaintext);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
  return {
    salt: U8.toB64(salt),
    iv: U8.toB64(iv),
    data: U8.toB64(new Uint8Array(ciphertext)),
  };
}

async function decrypt(saltB64, ivB64, dataB64, password) {
  const key = await deriveKey(password, saltB64);
  const iv = U8.fromB64(ivB64);
  const ciphertext = U8.fromB64(dataB64);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

// Uint8Array helpers
const U8 = {
  toB64: (u8) => btoa(String.fromCharCode(...u8)),
  fromB64: (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0)),
};

// ==================== SCREEN MANAGEMENT ====================
function showScreen(screen) {
  [scrLogin, scrMaster, scrVault].forEach(s => s.classList.add('hidden'));
  screen.classList.remove('hidden');
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearError(el) { el.classList.add('hidden'); }

// ==================== AUTH ====================
formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError(loginError);
  btnLogin.disabled = true;
  btnLogin.textContent = 'Ingresando...';

  const { ok, data } = await api('POST', '/api/auth/login', {
    username: inpLoginUser.value.trim(),
    password: inpLoginPass.value,
  });

  if (!ok) {
    showError(loginError, data.error || 'Error al iniciar sesión');
    btnLogin.disabled = false;
    btnLogin.textContent = 'Iniciar sesión';
    return;
  }

  state.username = data.username;
  inpLoginPass.value = '';
  btnLogin.disabled = false;
  btnLogin.textContent = 'Iniciar sesión';
  await afterLogin();
});

async function afterLogin() {
  // Check if vault exists
  const { ok, status, data } = await api('GET', '/api/vault');

  if (ok) {
    // Vault exists — need master password to decrypt
    state.salt = data.salt;
    state.iv = data.iv;
    state.data = data.data;
    state.version = data.version;
    showMasterScreen('unlock');
  } else if (status === 404) {
    // No vault yet — create new
    state.salt = null;
    state.iv = null;
    state.data = null;
    state.version = null;
    showMasterScreen('create');
  } else {
    showError(loginError, data.error || 'Error al conectar con el servidor');
  }
}

function showMasterScreen(mode) {
  clearError(masterError);
  inpMasterPass.value = '';
  inpMasterConf.value = '';

  if (mode === 'create') {
    masterTitle.textContent = '🆕 Crear bóveda nueva';
    masterSub.textContent = 'Elige una contraseña maestra para cifrar tus credenciales. Esta contraseña nunca se envía al servidor.';
    masterConfLabel.classList.remove('hidden');
    inpMasterConf.classList.remove('hidden');
    btnMaster.textContent = 'Crear bóveda';
    $('master-confirm-label').textContent = 'Confirmar contraseña maestra';
  } else {
    masterTitle.textContent = '🔑 Desbloquear bóveda';
    masterSub.textContent = 'Ingresa tu contraseña maestra para descifrar tus credenciales';
    masterConfLabel.classList.add('hidden');
    inpMasterConf.classList.add('hidden');
    btnMaster.textContent = 'Desbloquear';
  }
  showScreen(scrMaster);
}

formMaster.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError(masterError);
  const password = inpMasterPass.value;

  if (masterConfLabel.classList.contains('hidden')) {
    // Unlock mode
    btnMaster.disabled = true;
    btnMaster.textContent = 'Descifrando...';
    try {
      const json = await decrypt(state.salt, state.iv, state.data, password);
      state.masterPassword = password;
      state.credentials = JSON.parse(json);
      inpMasterPass.value = '';
      showVaultScreen();
    } catch {
      showError(masterError, 'Contraseña maestra incorrecta. Los datos no pudieron descifrarse.');
    }
    btnMaster.disabled = false;
    btnMaster.textContent = 'Desbloquear';
  } else {
    // Create mode
    if (password !== inpMasterConf.value) {
      showError(masterError, 'Las contraseñas no coinciden.');
      return;
    }
    if (password.length < 4) {
      showError(masterError, 'La contraseña maestra debe tener al menos 4 caracteres.');
      return;
    }
    btnMaster.disabled = true;
    btnMaster.textContent = 'Creando bóveda...';
    state.masterPassword = password;
    state.credentials = [];
    inpMasterPass.value = '';
    inpMasterConf.value = '';
    await saveVaultToServer();
    btnMaster.disabled = false;
    btnMaster.textContent = 'Crear bóveda';
    showVaultScreen();
  }
});

// ==================== VAULT SCREEN ====================
function showVaultScreen() {
  vaultUsername.textContent = `👤 ${state.username}`;
  renderCredentials();
  showScreen(scrVault);
}

function renderCredentials() {
  credList.innerHTML = '';
  const creds = state.credentials;
  if (!creds || creds.length === 0) {
    credList.innerHTML = '<div class="empty-state">No hay credenciales guardadas. Haz clic en "Agregar" para empezar.</div>';
    vaultStatus.textContent = `${creds ? 0 : '—'} credenciales`;
    return;
  }
  vaultStatus.textContent = `${creds.length} credenciales`;
  creds.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'cred-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${esc(c.name || 'Sin nombre')}</div>
        <div class="detail">${esc(c.username || '')}${c.url ? ' · ' + esc(c.url) : ''}</div>
      </div>
      <div class="actions">
        <button class="btn btn-outline btn-sm" data-action="edit" data-index="${i}">✏️</button>
        <button class="btn btn-danger btn-sm" data-action="delete" data-index="${i}">🗑️</button>
      </div>
    `;
    // Click on item copies password
    div.querySelector('.info').addEventListener('click', () => copyPassword(i));
    div.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        if (btn.dataset.action === 'edit') openCredModal(idx);
        if (btn.dataset.action === 'delete') deleteCred(idx);
      });
    });
    credList.appendChild(div);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function copyPassword(index) {
  const cred = state.credentials[index];
  if (!cred || !cred.password) return;
  try {
    await navigator.clipboard.writeText(cred.password);
    vaultStatus.textContent = '🔑 Contraseña copiada al portapapeles';
    setTimeout(() => {
      vaultStatus.textContent = `${state.credentials.length} credenciales`;
    }, 2000);
  } catch {
    vaultStatus.textContent = 'No se pudo copiar';
  }
}

function deleteCred(index) {
  if (!confirm(`¿Eliminar "${state.credentials[index].name || 'sin nombre'}"?`)) return;
  state.credentials.splice(index, 1);
  saveVaultToServer();
  renderCredentials();
}

// ==================== CREDENTIAL MODAL ====================
function openCredModal(index) {
  const editing = index !== undefined && index >= 0;
  state.editingIndex = editing ? index : -1;
  modalCredTitle.textContent = editing ? 'Editar credencial' : 'Nueva credencial';

  if (editing) {
    const c = state.credentials[index];
    credName.value = c.name || '';
    credUsername.value = c.username || '';
    credPassword.value = c.password || '';
    credUrl.value = c.url || '';
  } else {
    credName.value = '';
    credUsername.value = '';
    credPassword.value = '';
    credUrl.value = '';
    // Generate random password
    credPassword.value = generatePassword();
  }
  clearError(credError);
  modalCred.classList.remove('hidden');
  credName.focus();
}

function closeCredModal() {
  modalCred.classList.add('hidden');
}

formCred.addEventListener('submit', (e) => {
  e.preventDefault();
  clearError(credError);
  const name = credName.value.trim();
  if (!name) {
    showError(credError, 'El nombre es obligatorio');
    return;
  }
  const entry = {
    name,
    username: credUsername.value.trim(),
    password: credPassword.value,
    url: credUrl.value.trim(),
  };

  if (state.editingIndex >= 0) {
    state.credentials[state.editingIndex] = entry;
  } else {
    state.credentials.push(entry);
  }
  closeCredModal();
  saveVaultToServer();
  renderCredentials();
});

btnCredCancel.addEventListener('click', closeCredModal);
modalCred.addEventListener('click', (e) => {
  if (e.target === modalCred) closeCredModal();
});

function generatePassword(len = 20) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
  let pwd = '';
  const arr = crypto.getRandomValues(new Uint8Array(len));
  for (let i = 0; i < len; i++) {
    pwd += chars[arr[i] % chars.length];
  }
  return pwd;
}

btnAdd.addEventListener('click', () => openCredModal());

// ==================== SAVE / SYNC ====================
async function saveVaultToServer() {
  try {
    const json = JSON.stringify(state.credentials);
    const encrypted = await encrypt(json, state.masterPassword);
    state.salt = encrypted.salt;
    state.iv = encrypted.iv;
    state.data = encrypted.data;
    if (state.version) state.version++;

    const { ok } = await api('PUT', '/api/vault', {
      salt: encrypted.salt,
      iv: encrypted.iv,
      data: encrypted.data,
    });
    if (!ok) {
      vaultStatus.textContent = '⚠️ Error al guardar en el servidor';
    }
  } catch (err) {
    vaultStatus.textContent = '⚠️ Error al cifrar';
  }
}

// ==================== EXPORT / IMPORT ====================
btnExport.addEventListener('click', async () => {
  if (!state.credentials || state.credentials.length === 0) {
    vaultStatus.textContent = 'No hay credenciales para exportar';
    return;
  }
  // Also save to server first
  await saveVaultToServer();

  const blobData = {
    salt: state.salt,
    iv: state.iv,
    data: state.data,
    version: state.version,
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(blobData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `boveda-${new Date().toISOString().slice(0, 10)}${VAULT_FILE_EXT}`;
  a.click();
  URL.revokeObjectURL(url);
  vaultStatus.textContent = '✅ Exportado y sincronizado con el servidor';
  setTimeout(() => renderCredentials(), 2000);
});

btnImport.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const blobData = JSON.parse(text);
    if (!blobData.salt || !blobData.iv || !blobData.data) {
      vaultStatus.textContent = '⚠️ Archivo inválido';
      return;
    }
    state.salt = blobData.salt;
    state.iv = blobData.iv;
    state.data = blobData.data;
    state.version = blobData.version || 1;
    fileInput.value = '';
    // Now ask for master password to decrypt
    showMasterScreen('unlock');
  } catch {
    vaultStatus.textContent = '⚠️ No se pudo leer el archivo';
  }
});

// ==================== LOGOUT ====================
btnLogout.addEventListener('click', async () => {
  await api('POST', '/api/auth/logout');
  state = {
    username: null,
    masterPassword: null,
    salt: null,
    iv: null,
    data: null,
    version: null,
    credentials: [],
    editingIndex: -1,
  };
  inpLoginUser.value = '';
  inpLoginPass.value = '';
  clearError(loginError);
  showScreen(scrLogin);
});

// ==================== INIT ====================
showScreen(scrLogin);
</script>
</body>
